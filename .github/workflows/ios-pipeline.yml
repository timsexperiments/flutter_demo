name: iOS Build and Release

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
    tags:
      - "v*"

jobs:
  build_ios:
    name: Build & Deploy iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine Environment and Lane
        id: set_env
        run: |
          if [[ "\${{ github.event_name }}" == "pull_request" ]]; then
            echo "APP_ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "FASTLANE_LANE=pr_build" >> $GITHUB_ENV
          elif [[ "\${{ github.event_name }}" == "push" && "\${{ github.ref_type }}" == "tag" ]]; then
            echo "APP_ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "FASTLANE_LANE=release_prod" >> $GITHUB_ENV
          else
            echo "APP_ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "FASTLANE_LANE=beta_dev" >> $GITHUB_ENV
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Fastlane
        run: cd ios && bundle install

      - name: Setup GCS Credentials
        run: echo '${{ secrets.GCP_CREDENTIALS_JSON }}' > ios/gcp_keys.json

      - name: Run Fastlane
        run: cd ios && bundle exec fastlane ${{ env.FASTLANE_LANE }}
        env:
          APP_ENVIRONMENT: ${{ env.APP_ENVIRONMENT }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GCS_BUCKET: ${{ secrets.MATCH_GCS_BUCKET }}
          MATCH_GC_KEYS_FILE: 'gcp_keys.json'
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
